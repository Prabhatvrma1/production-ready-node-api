name: Lint & Format

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-format:
    name: ESLint + Prettier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        # Fail fast with a clear annotation
        continue-on-error: false

      - name: Run Prettier check
        run: npm run format:check
        continue-on-error: false

      - name: Suggest fixes on failure
        if: failure()
        run: |
          echo "::error::Lint or formatting issues were found."
          echo "::notice::To auto-fix lint issues, run: npm run lint:fix"
          echo "::notice::To auto-fix formatting, run: npm run format"
